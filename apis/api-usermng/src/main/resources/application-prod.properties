# ============================================================================
# Configuration pour l'environnement de production
# ============================================================================

# Database (utiliser des variables d'environnement)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/user_management}
spring.datasource.username=${DB_USERNAME:viridial-dev}
spring.datasource.password=${DB_PASSWORD:viridial-dev}

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logging
logging.level.com.realestate.user=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.file.name=/var/log/user-service/application.log
logging.file.max-size=10MB
logging.file.max-history=30

# Actuator (sécurisé en production)
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoints.web.base-path=/actuator

# JWT (doit être défini via variable d'environnement)
jwt.secret=${JWT_SECRET:CHANGE_THIS_IN_PRODUCTION_MINIMUM_256_BITS}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Alias pour compatibilité (si le code utilise security.jwt.secret)
security.jwt.secret=${jwt.secret}
security.jwt.expiration=${jwt.expiration}

# Redis Cache Configuration
spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST:148.230.112.148}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.username=${REDIS_USERNAME:hsassa}
spring.data.redis.password=${REDIS_PASSWORD:Abcd@1984}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# Security
server.compression.enabled=true
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

