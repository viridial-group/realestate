# ============================================================================
# Configuration pour l'environnement de d\u00c3\u00a9veloppement
# ============================================================================

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/user_management
spring.datasource.username=viridial-dev
spring.datasource.password=viridial-dev

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.com.realestate.user=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Actuator (plus permissif en dev)
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# JWT (dev secret - changer en production)
jwt.secret=dev-secret-key-minimum-256-bits-for-development-only
jwt.expiration=86400000

# Alias pour compatibilit\u00c3\u00a9
security.jwt.secret=${jwt.secret}
security.jwt.expiration=${jwt.expiration}

# Redis Cache Configuration
spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST:148.230.112.148}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.username=${REDIS_USERNAME:hsassa}
spring.data.redis.password=${REDIS_PASSWORD:Abcd@1984}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0


