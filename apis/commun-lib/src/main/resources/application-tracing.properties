# ============================================================================
# Configuration Distributed Tracing (Micrometer Tracing) pour tous les microservices
# ============================================================================

# Micrometer Tracing Configuration
management.tracing.sampling.probability=1.0
management.tracing.enabled=true

# Zipkin Configuration
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
management.zipkin.tracing.base-url=http://localhost:9411

# Tracing Tags (ajoutés automatiquement aux traces)
management.tracing.tags.application=${spring.application.name}
management.tracing.tags.environment=${spring.profiles.active:default}

# Propagation (B3, W3C)
management.tracing.propagation.type=W3C

# Baggage (pour passer des données entre services)
management.tracing.baggage.enabled=true
management.tracing.baggage.remote-fields=userId,organizationId,requestId

