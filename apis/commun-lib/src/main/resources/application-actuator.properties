# ============================================================================
# Configuration Actuator pour tous les microservices
# ============================================================================

# Exposer les endpoints Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus,env,loggers
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=always

# Health Check Configuration
management.health.defaults.enabled=true
management.health.db.enabled=true
management.health.diskspace.enabled=true
management.health.ping.enabled=true

# Metrics Configuration
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.tags.environment=${spring.profiles.active:default}

# Info Endpoint
info.app.name=${spring.application.name}
info.app.description=${spring.application.description:Microservice}
info.app.version=${project.version:1.0.0}

