# ============================================================================
# Common Messages (English) - Used by all microservices
# ============================================================================

# General errors
error.generic=An unexpected error occurred
error.not.found=Entity not found
error.validation=Data validation error
error.access.denied=Access denied
error.authentication.failed=Authentication failed
error.illegal.argument=Invalid argument

# Validation errors
error.validation.field.required=Field {0} is required
error.validation.field.invalid=Field {0} is invalid
error.validation.email.invalid=Email {0} is not valid
error.validation.password.weak=Password is too weak

# Authentication errors
error.auth.invalid.credentials=Invalid credentials
error.auth.user.not.found=User not found
error.auth.token.invalid=Invalid token
error.auth.token.expired=Token expired

# Generic access errors
error.permission.required=Permission required: {0}
error.role.required=Role required: {0}

# Concurrency errors
error.concurrent.update=This entity has been modified by another user. Please reload the data and try again.

# Generic success messages
success.created=Created successfully
success.updated=Updated successfully
success.deleted=Deleted successfully
success.activated=Activated successfully
success.deactivated=Deactivated successfully
